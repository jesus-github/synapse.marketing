<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse - Presentación de Vídeos</title>
    <!-- Favicon / Font Options -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.1.9">
</head>

<body>

    <!-- Header Removed (Logo moved inside player) -->

    <!-- Slider for Videos -->
    <main class="slider-container" id="slider">
        <!-- Videos will be injected here via JS -->
    </main>

    <!-- UI Overlay container -->
    <div class="glass-overlay">
        <!-- Main Info and Controls Card -->
        <div class="glass-card main-panel">
            <div class="brand-container">
                <img src="media/Synapse_Logo_01_Fondo_Claro.svg" alt="Synapse Logo" class="player-logo">
            </div>
            <div class="index-badge"><span id="current-index">01</span> <span class="total-badge">/ 06</span></div>
            <h1 id="video-title">Cargando...</h1>
            <p id="video-description">Presentación de nuestros servicios y proyectos destacados en formato inmersivo.
            </p>

            <div class="player-controls">
                <button id="prev-btn" class="icon-btn" title="Anterior">
                    <svg viewBox="0 0 24 24">
                        <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z" />
                    </svg>
                </button>
                <button id="play-btn" class="icon-btn" title="Reproducir / Pausar">
                    <svg id="icon-play" viewBox="0 0 24 24" style="display:none;">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                    <svg id="icon-pause" viewBox="0 0 24 24">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                    </svg>
                </button>
                <button id="next-btn" class="icon-btn" title="Siguiente">
                    <svg viewBox="0 0 24 24">
                        <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z" />
                    </svg>
                </button>

                <!-- Playlist Toggle -->
                <button id="playlist-btn" class="icon-btn" title="Galería de vídeos">
                    <svg viewBox="0 0 24 24">
                        <path d="M4 10h12v2H4zm0-4h12v2H4zm0 8h8v2H4zm10 0v6l5-3z" />
                    </svg>
                </button>

                <!-- Audio Toggle -->
                <button id="mute-btn" class="icon-btn" style="margin-left: auto;" title="Silenciar / Activar Sonido">
                    <svg id="icon-sound" viewBox="0 0 24 24" style="display:none;">
                        <path
                            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                    </svg>
                    <svg id="icon-mute" viewBox="0 0 24 24">
                        <path
                            d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" />
                    </svg>
                </button>
            </div>

            <div class="progress-bar-container" id="progress-container" style="margin-top: 20px;">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>

            <!-- Expandable Playlist -->
            <div id="playlist-container" class="playlist-expanded">
                <!-- Items injected via JS -->
            </div>

            <!-- Sidebar Toggle Handle -->
            <button id="sidebar-toggle" class="sidebar-handle" title="Ocultar / Mostrar">
                <svg class="handle-arrow" viewBox="0 0 24 24">
                    <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Orientation Warning Overlay -->
    <div class="orientation-warning">
        <div class="warning-content">
            <svg class="phone-icon" viewBox="0 0 24 24">
                <path
                    d="M16 1H8C6.34 1 5 2.34 5 4v16c0 1.66 1.34 3 3 3h8c1.66 0 3-1.34 3-3V4c0-1.66-1.34-3-3-3zm-2 20h-4v-1h4v1zm3.25-3H6.75V4h10.5v14z" />
            </svg>
            <p>Por favor, rota tu dispositivo para una mejor experiencia</p>
        </div>
    </div>

    <script src="script.js?v=1.1.9"></script>
</body>

</html>
